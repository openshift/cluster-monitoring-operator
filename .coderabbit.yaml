# Inherits org-wide settings from https://github.com/openshift/coderabbit/blob/main/.coderabbit.yaml
inheritance: true
reviews:
  high_level_summary: false
  review_status: false
  collapse_walkthrough: true
  sequence_diagrams: false
  changed_files_summary: false
  enable_prompt_for_ai_agents: false
  pre_merge_checks:
    custom_checks:
      - name: "Telemetry checks"
        mode: error
        instructions: |
          These checks apply to PRs that add or modify telemetry selectors in
          manifests/0000_50_cluster-monitoring-operator_04-config.yaml.

          Definitions:
          - "PR description" means the PR body field exclusively (not title, not commits).
            Fetch it with: `gh pr view <PR_NUMBER> --repo <OWNER/REPO> --json body -q .body`
            The PR description may be updated during review; always fetch the latest version.
          - A selector is "new" if it did not exist before the PR.
          - A selector is "modified" if any of its matchers changed (e.g. `{__name__="foo"}`
            becoming `{__name__="foo", bar="baz"}`).
          - "Affected selectors" means all new and modified selectors in the PR.

          Run checks **1** through **6** in order. DO NOT add analysis, inferences, or
          suggestions beyond what these checks require.

          **1. No selector removals:**
          If the PR removes any selector from the allow-list, **fail**. Removing a selector
          blocks that metric for all cluster versions because this configuration is shared with
          the Telemeter server. Removal MUST be coordinated with the monitoring team.

          **2. Owner and description:**
          For every affected selector, structured comments MUST appear directly above it:
            ```
            #
            # owners: <url or github handle>
            #
            # <description>.
            - '{__name__="metric", <label>=<value>}'
            ```
          Descriptions may span multiple `#` lines and MUST:
          - Explain the business purpose — why this data is collected and how Red Hat will
            use it.
          - Spell out abbreviations (e.g. "OBC" means "ObjectBucketClaim").
          - Be unique and accurate per selector, no copy-paste between selectors (e.g. do
            not write "resources" when the selector only covers "memory").
          **Fail** if owners or description are absent or incomplete.

          **3. Telemetry report data (gate for 4, 5, and 6):**
          The PR description MUST contain the output of `hack/telemetry_report.sh` for every
          affected selector. All of the following data points MUST be present per selector:
            - the selector string
            - matched metric names
            - timeseries count
            - per-metric recording rule status (file path, expression)
            - label names with their distinct-value counts
          Example output (exact wording may vary):
            ```
            selector: {__name__="<name>", <label>=<value>}
            matched metrics:
              - <name>
            timeseries count: <n>
            recording rules:
              - <name> (recording rule)
                file: <path>
                expression: <expr>
            labels count:
              <label>: <n>
            ```
          If any affected selector is missing this data, **fail** and ask the author to run:
          `hack/telemetry_report.sh <PROM_URL> '<selector>' ...`

          **4. Cardinality, selector hygiene, and privacy (requires 3):**
          Using the report data from **3.**:
          a) Cardinality limits: at most 1-3 new selectors per PR, at most 1-10 timeseries
             per selector, at most 10 new timeseries total. If exceeded, do not fail — **flag**
             and ask the author to add a justification in the PR description.
          b) Prefer exact `__name__="..."` over regex `__name__=~"..."`. Regex selectors are
             acceptable only when the author proves cardinality stays within the limits in
             (a). Otherwise **flag**.
          c) All label matchers in a selector MUST restrict values to known/expected sets. This
             is defense-in-depth: even if current cardinality in the report looks fine, open-ended
             matchers risk cardinality explosions if the underlying metric or recording rule changes.
             **Flag** selectors with open-ended or missing label matchers.
          d) Selectors MUST NOT expose identifying information (e.g. names, emails, org names,
             that reveal tenant identity). **Fail** if identifying data is present.

          **5. Recording rule conventions (requires 3):**
          For each metric flagged as a recording rule in the report data from **3.**, check:
          a) The metric name MUST follow `level:metric_name:aggregation`
             (e.g. `cluster:my_metric:sum`). The suffix MUST match the actual aggregation
             function: `:sum`, `:max`, `:count`, `:info`, `:histogram_quantile`. Do not use
             `:total` (reserved for raw counters). Only recording rule names may contain
             colons; raw metric names MUST use underscores.
          b) In the recording rule expression, `rate()` MUST be applied before `sum()` when
             aggregating counters — summing counters directly produces wrong results on resets.
             Verify this in the expression from the report.
          **Fail** if (a) or (b) is violated.

          **6. Redundancy check (requires 3):**
          Before accepting a new selector, verify the signal is not already captured by:
          existing regex selectors (e.g. `{__name__=~"cluster:usage:.*"}`), existing aggregated
          selectors (`count:up0`, `count:up1`), `cluster_operator_conditions`, or alerts (which
          are already pushed to telemetry). **Flag** potentially redundant selectors and ask
          the author to justify why a new selector is needed.
