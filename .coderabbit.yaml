# Inherits org-wide settings from https://github.com/openshift/coderabbit/blob/main/.coderabbit.yaml
inheritance: true
reviews:
  high_level_summary: false
  review_status: false
  collapse_walkthrough: true
  sequence_diagrams: false
  changed_files_summary: false
  enable_prompt_for_ai_agents: false
  pre_merge_checks:
    custom_checks:
      - name: "Telemetry checks"
        mode: error
        instructions: |
          When reviewing PRs that add or modify telemetry configuration in
          manifests/0000_50_cluster-monitoring-operator_04-config.yaml,
          enforce the following checks.

          A metric is **modified** if its selector changes in any way,
          including adding or removing label matchers
          (e.g. `{__name__="foo"}` becoming `{__name__="foo", bar="baz"}`).

          **0. No metric removals:**
          If the PR drops a metric from the allow-list, **fail**.
          This configuration is shared with the Telemeter server:
          dropping a metric blocks it for every previous cluster
          version still reporting it. Direct the author to contact
          the monitoring team if removal is truly intended.

          **1. Owner and description:**
          For each new or changed selector, structured comments MUST
          appear immediately above it, matching this repository's
          convention (compare with existing entries). Expected shape:
            ```
            #
            # owners: (owners)
            #
            # <name> <what it measures and why it belongs in telemetry>.
            - '{__name__="metric", <label>=<value>}'
            ```
          Descriptions may span multiple `#` lines. **Fail** if owners
          or description are absent, incomplete, or clearly inconsistent
          with nearby examples.

          **2. hack/metric_report.sh output:**
          The PR description MUST contain the full stdout of
          `hack/metric_report.sh` for every affected metric.
          Expected shape:
            ```
            Telemetry metrics report
            time window: <start> to <end> (24h)

            metric: <name>
            recording rule: yes|no
            file: <path>
            expr:
              <expression>
            series count: <n>
            labels count:
              <label>: <n>
              ...

            metric: <other-name>
            recording rule: yes|no
            series count: <n>
            labels: (none)
            ...
            ```
          If this output is missing, **fail**. Ask the author to run
          `hack/metric_report.sh` with no arguments for usage, then
          paste the full report into the PR description.

          **3. Cardinality and privacy (requires **2.**):**
          Using `series count` and `labels count` from each block:
          at most 1-3 new metrics per PR, at most 1-10 timeseries
          per metric, at most 10 timeseries total. **Fail** if
          exceeded. If the report from **2.** is absent, **fail**
          as well. Metrics MUST NOT contain personally identifiable
          information: no names, email addresses, or data about
          specific user workloads.
