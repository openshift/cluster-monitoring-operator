# Inherits org-wide settings from https://github.com/openshift/coderabbit/blob/main/.coderabbit.yaml
inheritance: true
reviews:
  high_level_summary: false
  review_status: false
  collapse_walkthrough: true
  sequence_diagrams: false
  changed_files_summary: false
  enable_prompt_for_ai_agents: false
  pre_merge_checks:
    custom_checks:
      - name: "Telemetry checks - errors"
        mode: error
        instructions: |
          When reviewing PRs that add or modify telemetry/telemeter configuration in
          manifests/0000_50_cluster-monitoring-operator_04-config.yaml, enforce the following.

          A metric is considered **modified** if its selector changes in any way,
          including adding or removing label matchers (e.g. changing
          `{__name__="foo"}` to `{__name__="foo", bar="baz"}`).

          Verify the PR description contains the full stdout of `hack/metric_report.sh` for
          every affected metric. The expected shape is:
          ```
          Telemetry metrics report
          time window: <start> to <end> (24h)

          metric: <name>
          recording rule: yes|no
          file: <path>
          expr:
            <expression>
          series count: <n>
          labels count:
            <label>: <n>
            ...

          metric: <other-name>
          recording rule: yes|no
          series count: <n>
          labels: (none)
          ...
          ```
          If this output is missing from the PR body, **fail**. Ask the author to run
          `hack/metric_report.sh` (no arguments) for usage, then paste the full report
          into the PR description in a code block for all affected metrics.

      - name: "Telemetry checks - warnings"
        mode: warning
        instructions: |
          When reviewing PRs that add or modify telemetry/telemeter configuration in
          manifests/0000_50_cluster-monitoring-operator_04-config.yaml, check the following.

          **1. Owner and description:**
            For each new or changed telemetry selector in that file, check that structured
            comments appear immediately above the selector and match this repository's pattern
            (compare with existing entries in the same file). Expected shape:
              ```
              #
              # owners: (owners)
              #
              # <name> <what it measures and why it belongs in telemetry>.
              - '{__name__="metric", <label>=<value>}'
              ```
            Descriptions may span multiple `#` lines. **Fail** if owners or description are
            absent, incomplete, or clearly inconsistent with nearby examples.

          **2. Cardinality and privacy:**
            If the PR description contains the output of `hack/metric_report.sh` (see the
            "Telemetry checks - errors" check), use `series count` and `labels count` from each
            block. Recommended limits: at most 1-3 new metrics; at most 1-10 timeseries per
            metric; at most 10 timeseries total. **Fail** if these are exceeded.
            If the report is absent, **fail** this check as well.
            Metrics MUST NOT contain personally identifiable information: no names, email
            addresses, or information about specific user workloads.
