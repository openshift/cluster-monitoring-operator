      curl --cacert <(printf "%s" "$CA_CERT") -X POST --fail "https://alertmanager-main.openshift-monitoring:9092/api/v2/silences?namespace=test-alertmanager-tenancy-monitoring-edit" \
        -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
        -d '{
          "matchers": [
            {
